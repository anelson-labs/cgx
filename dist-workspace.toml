[workspace]
# Only build binary crates, not the library crate (cgx-core)
members = ["cargo:cgx", "cargo:cargo-cgx"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# We inject our own rust-cache restore in CI instead of using cargo-dist's built-in build cache.
cache-builds = false
# Whether to embed dependency information using cargo-auditable
cargo-auditable = true
# CI backends to support
ci = "github"
# Extra GitHub Actions steps to run before cargo-dist invokes `dist build`.
# cargo-dist resolves this path relative to `.github/workflows`.
github-build-setup = "../dist-build-setup.yml"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "aarch64-unknown-linux-musl",
  "aarch64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "x86_64-pc-windows-msvc",
]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

# Most of our build targets need some customization of the GHA runner.
# "custom" here just means "not the dist default"; these are all various standard Github-hosted runners.
[dist.github-custom-runners]
aarch64-pc-windows-msvc   = "windows-11-arm"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"

# macOS runners: Now that the repo is public, standard GitHub-hosted macOS runners are free!
# These replace the deprecated macos-13 runners.
aarch64-apple-darwin = "macos-15"       # ARM64 (M1/M2), free for public repos
x86_64-apple-darwin  = "macos-15-intel" # Intel x86_64, free for public repos (sunsets Fall 2027)

# The Linux musl targets build natively on their own-arch Ubuntu runners without any cross-compilation.
# We vendor OpenSSL + libcurl statically for musl in cgx-core/Cargo.toml, so a
# plain `cargo build --target *-musl` (with musl-tools, which dist installs automatically) links
# everything statically without an Alpine image.
#
# The explicit `host` triple is important here: it tells `cargo dist` that these runners are native to the
# target's CPU arch, so cargo-dist doesn't try to generate some cargo-zigbuild cross-compilation job. That matters
# because cargo-dist errors out if it detects an attempt to combine cargo-auditable with a zigbuild cross-compile
aarch64-unknown-linux-musl = { runner = "ubuntu-24.04-arm", host = "aarch64-unknown-linux-gnu" }
x86_64-unknown-linux-musl  = { runner = "ubuntu-24.04", host = "x86_64-unknown-linux-gnu" }
